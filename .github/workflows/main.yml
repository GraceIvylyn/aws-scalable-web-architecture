name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3

        with:
          host: ${{ secrets.EC2HOST }}
          username: ${{ secrets.EC2USER }}
          key: ${{ secrets.EC2SSHKEY }}
          script: |
            cd /home/ec2-user/
            ./deploy.sh
